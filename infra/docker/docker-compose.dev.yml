services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-retrosnap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retrosnap}
      POSTGRES_DB: ${POSTGRES_DB:-retrosnap}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://retrosnap:retrosnap@postgres:5432/retrosnap?sslmode=disable}
    volumes:
      - ../../services/api/migrations:/migrations:ro
    command: >
      sh -c '
      for file in /migrations/*.sql; do
        echo "Applying $${file}";
        psql "$${DATABASE_URL}" -v ON_ERROR_STOP=1 -f "$${file}";
      done
      '

  api:
    build:
      context: ../../services/api
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: :8080
      DATABASE_URL: ${DATABASE_URL:-postgres://retrosnap:retrosnap@postgres:5432/retrosnap?sslmode=disable}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
      GUEST_TOKEN_SECRET: ${GUEST_TOKEN_SECRET:-change-me}
      PRESIGNED_UPLOAD_TTL_SECONDS: ${PRESIGNED_UPLOAD_TTL_SECONDS:-900}
      ADMIN_SIGNED_URL_TTL_SECONDS: ${ADMIN_SIGNED_URL_TTL_SECONDS:-600}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-8388608}
      PUBLIC_GUEST_APP_URL: ${PUBLIC_GUEST_APP_URL:-http://localhost:5173}
      PUBLIC_DASHBOARD_URL: ${PUBLIC_DASHBOARD_URL:-http://localhost:5175}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:5175}
      R2_ENDPOINT: ${R2_ENDPOINT:?set R2_ENDPOINT to your Cloudflare R2 S3 API endpoint}
      R2_REGION: ${R2_REGION:-auto}
      R2_BUCKET: ${R2_BUCKET:?set R2_BUCKET to your Cloudflare R2 bucket}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?set R2_ACCESS_KEY_ID to your R2 access key ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?set R2_SECRET_ACCESS_KEY to your R2 secret access key}
      R2_FORCE_PATH_STYLE: ${R2_FORCE_PATH_STYLE:-true}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  image-worker:
    build:
      context: ../../services/image-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgres://retrosnap:retrosnap@postgres:5432/retrosnap?sslmode=disable}
      R2_ENDPOINT: ${R2_ENDPOINT:?set R2_ENDPOINT to your Cloudflare R2 S3 API endpoint}
      R2_REGION: ${R2_REGION:-auto}
      R2_BUCKET: ${R2_BUCKET:?set R2_BUCKET to your Cloudflare R2 bucket}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?set R2_ACCESS_KEY_ID to your R2 access key ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?set R2_SECRET_ACCESS_KEY to your R2 secret access key}
      R2_FORCE_PATH_STYLE: ${R2_FORCE_PATH_STYLE:-true}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-5}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
      WORKER_STALE_PROCESSING_MINUTES: ${WORKER_STALE_PROCESSING_MINUTES:-15}
      MAX_PROCESSING_ATTEMPTS: ${MAX_PROCESSING_ATTEMPTS:-8}
      ENABLE_TIMESTAMP_OVERLAY: ${ENABLE_TIMESTAMP_OVERLAY:-true}
      TIMEZONE: ${TIMEZONE:-Asia/Kuala_Lumpur}

  guest:
    image: node:22-bookworm-slim
    working_dir: /app
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_RETROSNAP_API_BASE_URL: ${VITE_RETROSNAP_API_BASE_URL:-http://localhost:8080}
    volumes:
      - ../../apps/guest:/app
      - guest-node-modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  dashboard:
    image: node:22-bookworm-slim
    working_dir: /app
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_RETROSNAP_API_BASE_URL: ${VITE_RETROSNAP_API_BASE_URL:-http://localhost:8080}
    volumes:
      - ../../apps/admin:/app
      - dashboard-node-modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5175"
    ports:
      - "5175:5175"

volumes:
  postgres-data:
  guest-node-modules:
  dashboard-node-modules:
